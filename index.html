<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldline Delivery | Premium Tracking</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">GOLDLINE <span class="gold">DELIVERY</span></div>
    </header>

    <main class="hero">
        <div class="hero-container">
            <h1>Track Shipment</h1>
            <div class="search-box">
                <input type="text" id="tracking-input" placeholder="Enter Tracking ID">
                <button onclick="trackPackage()">Track</button>
            </div>

            <!-- Tracking Results -->
            <div id="result-container" class="result-card hidden">
                <div class="result-header">
                    <h3>Status</h3>
                    <span id="status-badge" class="badge">Processing</span>
                </div>
                <div class="result-body">
                    <p><strong>ID:</strong> <span id="res-id"></span></p>
                    <p><strong>Location:</strong> <span id="res-location"></span></p>
                    <p><strong>Delivery:</strong> <span id="res-delivery"></span></p>
                    <p><strong>Details:</strong> <span id="res-desc"></span></p>
                </div>
            </div>
            <div id="error-message" class="error-card hidden">Invalid Tracking ID.</div>
        </div>
    </main>

    <!-- NEW: Dedicated Support Section (No Popup Needed) -->
    <section class="support-section">
        <h2>Customer Support</h2>
        <p>Need help? Contact our premium concierge desk.</p>
        
        <div class="support-options">
            <!-- Option 1: Direct Email -->
            <a href="mailto:your-email@gmail.com" class="support-box">
                <span class="gold">Email Us</span>
                <p>Direct priority inbox</p>
            </a>

          
               <!-- Live Contact Form for Vercel -->
<div class="form-container">
    <form action="https://formspree.io/f/mojbyroj" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Your Email Address" required>
        <textarea name="message" placeholder="How can we help you today?" required></textarea>
        
        <!-- This hidden input helps prevent spam -->
        <input type="text" name="_gotcha" style="display:none">
        
        <button type="submit">Submit Request</button>
   </div> <!-- Closes form-container -->
</section> <!-- Closes support-section -->
    <footer>
        <p>&copy; 2026 Goldline Delivery</p>
    </footer>

    <script>
        async function trackPackage() {
            const input = document.getElementById('tracking-input').value.trim().toUpperCase();
            const res = document.getElementById('result-container');
            const err = document.getElementById('error-message');
            res.classList.add('hidden');
            err.classList.add('hidden');

            try {
                const response = await fetch('tracking-data.json');
                const data = await response.json();
                if (data[input]) {
                    const info = data[input];
                    document.getElementById('res-id').innerText = input;
                    document.getElementById('res-location').innerText = info.location;
                    document.getElementById('res-delivery').innerText = info.estimated_delivery;
                    document.getElementById('res-desc').innerText = info.description;
                    document.getElementById('status-badge').innerText = info.status;
                    res.classList.remove('hidden');
                } else {
                    err.classList.remove('hidden');
                }
            } catch (e) { alert("System offline."); }
        }
    </script>
</body>
</html>
